---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloud-controller-manager
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:cloud-controller-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: cloud-controller-manager
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hcloud-cloud-controller-manager
  namespace: kube-system
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: hcloud-cloud-controller-manager
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hcloud-cloud-controller-manager
    spec:
      containers:
        - name: hcloud-cloud-controller-manager
          image: hetznercloud/hcloud-cloud-controller-manager:v1.22.0
          command:
            - /bin/hcloud-cloud-controller-manager
            - --cloud-provider=hcloud
            - --leader-elect=false
            - --allow-uninitialized-nodes
            - --allocate-node-cidrs=true
            - --cluster-cidr=10.244.0.0/16
          resources:
            requests:
              cpu: 100m
              memory: 50Mi
          env:
            - name: HCLOUD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hcloud
                  key: token
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HCLOUD_LOAD_BALANCERS_ENABLED
              value: "true"
            - name: HCLOUD_LOAD_BALANCERS_LOCATION
              value: "fsn1"
      dnsPolicy: Default
      serviceAccountName: cloud-controller-manager
      tolerations:
        # Allow scheduling on control plane nodes.
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        # Allow scheduling on uninitialized nodes (CCM must initialize them).
        - key: node.cloudprovider.kubernetes.io/uninitialized
          value: "true"
          effect: NoSchedule
        - key: CriticalAddonsOnly
          operator: Exists
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
