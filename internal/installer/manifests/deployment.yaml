apiVersion: apps/v1
kind: Deployment
metadata:
  name: konductor-operator
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/name: konductor-operator
    app.kubernetes.io/managed-by: konductor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: konductor-operator
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: konductor-operator
    spec:
      serviceAccountName: konductor-operator
      terminationGracePeriodSeconds: 30
      containers:
        - name: operator
          image: {{ .Image }}
          args:
            - operator
            - --namespace={{ .Namespace }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          env:
            - name: HCLOUD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .SecretName }}
                  key: hcloud-token
            - name: TALOS_WORKER_CONFIG
              valueFrom:
                secretKeyRef:
                  name: {{ .SecretName }}
                  key: talos-worker-config
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
